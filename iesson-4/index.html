<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>lesson-4</title>
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body>
		<form>
			<fieldset class="form">
				<h2 class="h2">Ваши личные данные</h2>
				<label class="label-1">
					<span class="span">Ваше имя</span>
					<input
						class="input"
						type="text"
						placeholder="Имя"
						name="name"
						required
					/>
				</label>
				<label class="label-1">
					<span class="span">Ваш возраст</span>
					<input
						class="input"
						type="number"
						placeholder="Возраст"
						name="age"
						required
					/>
				</label>
				<label class="label-1">
					<span class="span">Ваш номер телефона</span>
					<input
						class="input"
						type="tel"
						placeholder="Номер телефона"
						name="tel"
						required
					/>
				</label>
				<label class="label-1">
					<span class="span">Ваша почта</span>
					<input
						class="input"
						type="email"
						placeholder="Почта"
						name="email"
						required
					/>
				</label>
				<span class="span">Сообщение</span>
				<textarea
					class="textarea"
					name="messenge"
					placeholder="Ваше Сообщение"
					required
				></textarea>
				<label>
					<input
						class="checkbox"
						type="checkbox"
						name="agreement"
						value="agreement"
						required
					/>
					<span class="checkbox-text">Я принимаю правила</span>
				</label>
				<button class="button" type="submit">Отправить</button>
			</fieldset>
		</form>
	</body>
</html>
